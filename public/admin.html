<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - RequitDesign</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --accent: #b8924e;
      --accent2: #a6804a;
      --dark: #f5f5f7;
      --surface: #ffffff;
      --surface2: #f9f9f9;
      --text: #1a1a1a;
      --muted: #666666;
      --border: rgba(0,0,0,0.08);
      --font: 'DM Sans', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --accent: #c8a97e;
        --accent2: #e8d5b0;
        --dark: #0a0a0a;
        --surface: #111111;
        --surface2: #1a1a1a;
        --text: #f5f5f7;
        --muted: #86868b;
        --border: rgba(255,255,255,0.08);
      }
    }

    body {
      font-family: var(--font);
      background: var(--dark);
      color: var(--text);
      overflow-x: hidden;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 52px;
      background: rgba(10,10,10,0.72);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--border);
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 18px; letter-spacing: 0.05em;
      color: white;
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .nav-user {
      font-size: 13px;
      color: white;
    }

    .logout-btn {
      font-size: 13px;
      padding: 7px 18px;
      background: #dc2626;
      color: white;
      border-radius: 20px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: #b91c1c;
    }

    .container {
      display: flex;
      min-height: 100vh;
      padding-top: 52px;
    }

    .sidebar {
      width: 250px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar-menu {
      list-style: none;
    }

    .sidebar-menu li {
      margin-bottom: 10px;
    }

    .sidebar-menu button {
      width: 100%;
      padding: 12px;
      background: none;
      border: 1px solid transparent;
      border-radius: 8px;
      text-align: left;
      cursor: pointer;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s;
      font-family: inherit;
    }

    .sidebar-menu button:hover {
      background: var(--surface2);
      border-color: var(--accent);
    }

    .sidebar-menu button.active {
      background: var(--accent);
      color: #1a1000;
      border-color: var(--accent);
    }

    .main-content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .section-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 30px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      margin: 10px 0;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Products Table */
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 16px;
      text-align: left;
      font-weight: 600;
      color: var(--text);
    }

    td {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .action-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-right: 6px;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: var(--accent);
      color: #1a1000;
      border-color: var(--accent);
    }

    .action-btn.delete {
      color: #dc2626;
      border-color: #dc2626;
    }

    .action-btn.delete:hover {
      background: #dc2626;
      color: white;
    }

    .status-active {
      color: #16a34a;
    }

    .status-pending {
      color: #ca8a04;
    }

    .status-completed {
      color: #0891b2;
    }

    /* Forms */
    .form-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .submit-btn {
      padding: 12px 24px;
      background: var(--accent);
      color: #1a1000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: var(--accent2);
    }

    .error {
      color: #dc2626;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .success {
      background: #dcfce7;
      border: 1px solid #86efac;
      color: #166534;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }

    .success.show {
      display: block;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: var(--surface);
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text);
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 10px;
        overflow-x: auto;
      }

      .sidebar-menu {
        display: flex;
        gap: 10px;
      }

      .main-content {
        padding: 20px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 12px 8px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">RequitDesign Admin</a>
    <div class="nav-right">
      <div class="nav-user" id="navUser">Laden...</div>
      <button class="logout-btn" onclick="logout()">Abmelden</button>
    </div>
  </nav>

  <div class="container">
    <div class="sidebar">
      <ul class="sidebar-menu">
        <li><button class="active" data-section="dashboard">Dashboard</button></li>
        <li><button data-section="products">Produkte</button></li>
        <li><button data-section="orders">Bestellungen</button></li>
        <li><button data-section="users">Benutzer</button></li>
      </ul>
    </div>

    <div class="main-content">
      <!-- Dashboard Section -->
      <div id="dashboard" class="section active">
        <div class="section-title">Dashboard</div>
        <div class="stats-grid" id="statsContainer">
          <div class="stat-card">
            <div class="stat-label">Benutzer</div>
            <div class="stat-value" id="totalUsers">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Bestellungen</div>
            <div class="stat-value" id="totalOrders">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Umsatz</div>
            <div class="stat-value" id="totalRevenue">-€</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Produkte</div>
            <div class="stat-value" id="productCount">-</div>
          </div>
        </div>
      </div>

      <!-- Products Section -->
      <div id="products" class="section">
        <div class="section-title">Produkte verwalten</div>
        
        <button class="submit-btn" onclick="openProductModal()">+ Neues Produkt</button>
        
        <div style="margin-top: 30px;">
          <div class="error" id="productError"></div>
          <div class="success" id="productSuccess"></div>
          <div class="table-wrapper">
            <table id="productsTable">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Preis</th>
                  <th>Lager</th>
                  <th>Ausverkauft</th>
                  <th>Aktionen</th>
                </tr>
              </thead>
              <tbody id="productsBody">
                <tr><td colspan="5" style="text-align: center; color: var(--muted);">Lädt...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Orders Section -->
      <div id="orders" class="section">
        <div class="section-title">Bestellungen</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Bestellnummer</th>
                <th>Kunde</th>
                <th>Betrag</th>
                <th>Status</th>
                <th>Datum</th>
                <th>Aktionen</th>
              </tr>
            </thead>
            <tbody id="ordersBody">
              <tr><td colspan="6" style="text-align: center; color: var(--muted);">Lädt...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Users Section -->
      <div id="users" class="section">
        <div class="section-title">Benutzer</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>E-Mail</th>
                <th>Rolle</th>
                <th>Registriert</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="4" style="text-align: center; color: var(--muted);">Lädt...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Product Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">Produkt bearbeiten</div>
      <button class="modal-close" onclick="closeProductModal()">×</button>
      
      <form id="productForm">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="productName" required>
        </div>
        <div class="form-group">
          <label>Beschreibung</label>
          <textarea id="productDescription" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label>Preis</label>
          <input type="number" id="productPrice" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Lagerbestand</label>
          <input type="number" id="productStock" min="0" required>
        </div>
        <div class="form-group">
          <label>Kategorie</label>
          <input type="text" id="productCategory">
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="productSoldOut">
            Ausverkauft
          </label>
        </div>
        <button type="submit" class="submit-btn">Speichern</button>
      </form>
    </div>
  </div>

  <script>
    let currentProductId = null;

    // Menu Navigation
    document.querySelectorAll('[data-section]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('[data-section]').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        
        e.target.classList.add('active');
        const sectionId = e.target.dataset.section;
        document.getElementById(sectionId).classList.add('active');
        
        if (sectionId === 'dashboard') loadStats();
        else if (sectionId === 'products') loadProducts();
        else if (sectionId === 'orders') loadOrders();
        else if (sectionId === 'users') loadUsers();
      });
    });

    // Load initial data
    async function initAdmin() {
      const res = await fetch('/api/auth/me');
      if (!res.ok) window.location.href = '/login.html';
      
      const data = await res.json();
      document.getElementById('navUser').textContent = `Hallo, ${data.user.name}`;
      
      loadStats();
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/admin/stats');
        const stats = await res.json();
        
        document.getElementById('totalUsers').textContent = stats.totalUsers.count;
        document.getElementById('totalOrders').textContent = stats.totalOrders.count;
        document.getElementById('totalRevenue').textContent = (stats.totalRevenue.total || 0).toFixed(2) + '€';
        document.getElementById('productCount').textContent = stats.productsCount.count;
      } catch (error) {
        console.error('Stats Fehler:', error);
      }
    }

    async function loadProducts() {
      try {
        const res = await fetch('/api/admin/products');
        const products = await res.json();
        
        const tbody = document.getElementById('productsBody');
        tbody.innerHTML = products.map(p => `
          <tr>
            <td>${p.name}</td>
            <td>${p.price.toFixed(2)}€</td>
            <td>${p.stock}</td>
            <td>${p.sold_out ? '✓ Ja' : 'Nein'}</td>
            <td>
              <button class="action-btn" onclick="editProduct(${p.id})">Bearbeiten</button>
              <button class="action-btn delete" onclick="deleteProduct(${p.id})">Löschen</button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Products Fehler:', error);
      }
    }

    async function loadOrders() {
      try {
        const res = await fetch('/api/admin/orders');
        const orders = await res.json();
        
        const tbody = document.getElementById('ordersBody');
        tbody.innerHTML = orders.map(o => `
          <tr>
            <td>#${o.id}</td>
            <td>${o.name} (${o.email})</td>
            <td>${o.total_price.toFixed(2)}€</td>
            <td class="status-${o.status}">${o.status}</td>
            <td>${new Date(o.created_at).toLocaleDateString('de-DE')}</td>
            <td>
              <select onchange="updateOrderStatus(${o.id}, this.value)" style="padding: 6px; border-radius: 6px;">
                <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Ausstehend</option>
                <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>Bearbeitung</option>
                <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>Versandt</option>
                <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>Abgeschlossen</option>
              </select>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Orders Fehler:', error);
      }
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        
        const tbody = document.getElementById('usersBody');
        tbody.innerHTML = users.map(u => `
          <tr>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td>${u.role === 'admin' ? '👑 Admin' : 'Kunde'}</td>
            <td>${new Date(u.created_at).toLocaleDateString('de-DE')}</td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Users Fehler:', error);
      }
    }

    function openProductModal(productId = null) {
      currentProductId = productId;
      if (productId) {
        // Load product data for editing
        document.querySelector('.modal-header').textContent = 'Produkt bearbeiten';
      } else {
        document.querySelector('.modal-header').textContent = 'Neues Produkt';
        document.getElementById('productForm').reset();
      }
      document.getElementById('productModal').classList.add('show');
    }

    function closeProductModal() {
      document.getElementById('productModal').classList.remove('show');
      currentProductId = null;
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        name: document.getElementById('productName').value,
        description: document.getElementById('productDescription').value,
        price: parseFloat(document.getElementById('productPrice').value),
        stock: parseInt(document.getElementById('productStock').value),
        category: document.getElementById('productCategory').value,
        sold_out: document.getElementById('productSoldOut').checked
      };

      try {
        const method = currentProductId ? 'PUT' : 'POST';
        const url = currentProductId 
          ? `/api/admin/products/${currentProductId}`
          : '/api/admin/products';
        
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          document.getElementById('productSuccess').textContent = 'Produkt gespeichert!';
          document.getElementById('productSuccess').classList.add('show');
          closeProductModal();
          loadProducts();
          setTimeout(() => {
            document.getElementById('productSuccess').classList.remove('show');
          }, 3000);
        }
      } catch (error) {
        console.error('Fehler:', error);
      }
    });

    async function editProduct(productId) {
      // In production, you would fetch the product data first
      openProductModal(productId);
    }

    async function deleteProduct(productId) {
      if (confirm('Produkt wirklich löschen?')) {
        try {
          const res = await fetch(`/api/admin/products/${productId}`, { method: 'DELETE' });
          if (res.ok) loadProducts();
        } catch (error) {
          console.error('Fehler:', error);
        }
      }
    }

    async function updateOrderStatus(orderId, status) {
      try {
        const res = await fetch(`/api/admin/orders/${orderId}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        if (res.ok) loadOrders();
      } catch (error) {
        console.error('Fehler:', error);
      }
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    }

    // Initialize
    initAdmin();
  </script>
</body>
</html>
